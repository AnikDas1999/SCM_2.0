# ==========================================
# 🚀 Application & Server Configurations
# ==========================================
spring.application.name=scm2.0
server.port=8085

# ==========================================
# 💾 Database Connection Setup (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/scm20?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================
# 📊 JPA / Hibernate Configurations
# ==========================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# 🔒 In-Memory Security Testing Users
# ==========================================
spring.security.user.name=${SPRING_SECURITY_USERNAME}
spring.security.user.password=${SPRING_SECURITY_PASSWORD}

# ==========================================
# 🌐 Google OAuth2 Client Registrations
# ==========================================
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ==========================================
# 🐙 GitHub OAuth2 Client Registrations
# ==========================================
spring.security.oauth2.client.registration.github.client-name=github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# ==========================================
# ☁️ Cloudinary Configurations
# ==========================================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# ==========================================
# ⚡ Thymeleaf Development Configurations
# ==========================================
spring.thymeleaf.cache=false

# ==========================================
# 📦 Multipart File Upload Configurations
# ==========================================
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB